<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClickNRest</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a);
min-height:100vh;
color:white;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

header{
text-align:center;
margin-bottom:25px;
}

header h1{
font-size:2.5rem;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
margin-bottom:15px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

button:hover{
opacity:.9;
}

.room{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 0;
border-bottom:1px solid rgba(255,255,255,.1);
}

.room button{
width:auto;
padding:10px 18px;
}

.booking{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:10px;
}

.hidden{
display:none;
}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#2563eb;
padding:12px 20px;
border-radius:12px;
display:none;
z-index:1000;
}

.userBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}
</style>
</head>
<body>

<div class="container">

<header>
<h1>🏨 ClickNRest</h1>
<p>Easy Hotel Booking</p>
</header>

<div id="auth" class="card">

<h2>Login / Register</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="registerUser()">
Create Account
</button>

<button onclick="loginUser()">
Login
</button>

</div>

<div id="app" class="hidden">

<div class="card userBar">
<span id="welcome"></span>
<button onclick="logout()" style="width:auto">
Logout
</button>
</div>

<div class="card">

<h2>Available Rooms</h2>

<div class="room">
<div>
<h3>Standard Room</h3>
<p>$99/night</p>
</div>
<button onclick="bookRoom('Standard Room')">
Book
</button>
</div>

<div class="room">
<div>
<h3>Deluxe Room</h3>
<p>$149/night</p>
</div>
<button onclick="bookRoom('Deluxe Room')">
Book
</button>
</div>

<div class="room">
<div>
<h3>Luxury Suite</h3>
<p>$299/night</p>
</div>
<button onclick="bookRoom('Luxury Suite')">
Book
</button>
</div>

</div>

<div class="card">

<h2>Your Bookings</h2>

<div id="bookings">
No bookings yet.
</div>

</div>

</div>

</div>

<div id="toast"></div>

<script>

let currentUser =
localStorage.getItem("currentUser");

function showToast(text){

const toast =
document.getElementById("toast");

toast.innerText = text;

toast.style.display = "block";

setTimeout(()=>{
toast.style.display="none";
},3000);

}

function saveUsers(users){
localStorage.setItem(
"users",
JSON.stringify(users)
);
}

function getUsers(){
return JSON.parse(
localStorage.getItem("users")
) || [];
}
function registerUser(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if(!email || !password){
showToast("Fill all fields");
return;
}

let users = getUsers();

if(users.find(u => u.email === email)){
showToast("User already exists");
return;
}

users.push({
email,
password,
bookings:[]
});

saveUsers(users);

// 👇 AUTO LOGIN AFTER REGISTER
localStorage.setItem("currentUser", email);
currentUser = email;

showToast("Account created");

loadApp(); // switch to app view
}

  
function loginUser(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const users = getUsers();

const user =
users.find(
u =>
u.email===email &&
u.password===password
);

if(!user){
showToast("Invalid login");
return;
}

localStorage.setItem(
"currentUser",
email
);

currentUser = email;

loadApp();

showToast("Welcome!");

}

function logout(){

localStorage.removeItem(
"currentUser"
);

currentUser = null;

document
.getElementById("app")
.classList.add("hidden");

document
.getElementById("auth")
.classList.remove("hidden");

}

function bookRoom(room){

let users = getUsers();

let user =
users.find(
u=>u.email===currentUser
);

user.bookings.push({
room,
date:new Date()
.toLocaleString()
});

saveUsers(users);

loadBookings();

showToast(room + " booked!");

}

function loadBookings(){

let users = getUsers();

let user =
users.find(
u=>u.email===currentUser
);

let html="";

if(user.bookings.length===0){

html="No bookings yet.";

}else{

user.bookings.forEach(b=>{

html += `
<div class="booking">
<strong>${b.room}</strong>
<br>
${b.date}
</div>
`;

});

}

document
.getElementById("bookings")
.innerHTML = html;

}

function loadApp(){

document
.getElementById("auth")
.classList.add("hidden");

document
.getElementById("app")
.classList.remove("hidden");

document
.getElementById("welcome")
.innerText =
currentUser;

loadBookings();

}

if(currentUser){
loadApp();
}

</script>

</body>
</html>
