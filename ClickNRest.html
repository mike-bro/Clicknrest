<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClickNRest</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#0f172a;color:#fff;min-height:100vh;padding:20px}
.container{max-width:500px;margin:auto}
header{text-align:center;margin-bottom:20px}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border-radius:20px;padding:20px;margin-bottom:15px}
input{width:100%;padding:14px;margin:8px 0;border:none;border-radius:12px;background:#1e293b;color:#fff}
button{width:100%;padding:14px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-weight:600;cursor:pointer;margin-top:10px}
.room{display:flex;justify-content:space-between;align-items:center;margin:15px 0}
.room button{width:auto;padding:10px 18px}
.booking{background:#1e293b;padding:12px;border-radius:12px;margin-top:10px}
.hidden{display:none}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2563eb;padding:12px 20px;border-radius:10px;display:none}
</style>
</head>
<body>
<div class="container">
<header>
<h1>🏨 ClickNRest</h1>
<p>Modern Hotel Booking</p>
</header>

<div id="auth" class="card">
<h2>Login / Register</h2>
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Create Account</button>
<button onclick="login()">Login</button>
</div>

<div id="app" class="hidden">
<div class="card">
<h2>Available Rooms</h2>
<div class="room"><div><h3>Standard Room</h3><p>$99/night</p></div><button onclick="bookRoom('Standard Room')">Book</button></div>
<div class="room"><div><h3>Luxury Suite</h3><p>$299/night</p></div><button onclick="bookRoom('Luxury Suite')">Book</button></div>
</div>

<div class="card">
<h2>Your Bookings</h2>
<div id="bookings"></div>
</div>

<button onclick="logout()">Logout</button>
</div>
</div>

<div id="toast"></div>

<!-- Add your Firebase configuration below before deploying -->
</body>
</html>
